<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 200" width="600" height="200">
  <defs>
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.1"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="8" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#555"/>
    </marker>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
  </defs>

  <rect width="600" height="200" fill="#f8f9fa" rx="10"/>
  <text x="300" y="30" text-anchor="middle" font-family="Arial" font-size="18" font-weight="bold" fill="#333">Installation Flow</text>

  <!-- Step 1: User -->
  <rect x="20" y="70" width="100" height="50" rx="25" fill="url(#grad)"/>
  <text x="70" y="99" text-anchor="middle" font-family="Arial" font-size="13" fill="#fff" font-weight="bold">You</text>

  <!-- Arrow -->
  <line x1="120" y1="95" x2="155" y2="95" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Step 2: curl command -->
  <rect x="160" y="65" width="130" height="60" rx="8" fill="#fff" stroke="#1e88e5" stroke-width="2" filter="url(#shadow)"/>
  <text x="175" y="85" font-family="Arial" font-size="11" fill="#333">curl <tspan font-family="monospace" font-size="10" fill="#e83e8c">https://...</tspan></text>
  <text x="175" y="105" font-family="Arial" font-size="10" fill="#6c757d">fetch script</text>

  <line x1="290" y1="95" x2="325" y2="95" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Step 3: Installer script -->
  <rect x="330" y="65" width="130" height="60" rx="8" fill="#fff" stroke="#28a745" stroke-width="2" filter="url(#shadow)"/>
  <text x="348" y="85" font-family="Arial" font-size="11" fill="#333">install_dashboard.sh</text>
  <text x="355" y="105" font-family="Arial" font-size="10" fill="#6c757d">auto‑installer</text>

  <line x1="460" y1="95" x2="495" y2="95" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Step 4: Done -->
  <rect x="500" y="70" width="80" height="50" rx="25" fill="#28a745"/>
  <text x="540" y="100" text-anchor="middle" font-family="Arial" font-size="13" fill="#fff" font-weight="bold">Dashboard</text>
</svg>
