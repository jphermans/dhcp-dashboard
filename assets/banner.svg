<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 360" width="1200" height="360">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#1e293b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f172a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#06b6d4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGlow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#06b6d4;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:0.3" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <filter id="softShadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#06b6d4" flood-opacity="0.3" />
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="360" fill="url(#bg)" rx="20" />
  
  <!-- Accent line top -->
  <rect x="0" y="0" width="1200" height="4" fill="url(#accent)" rx="2" />
  
  <!-- Accent glow bottom -->
  <rect x="0" y="356" width="1200" height="4" fill="url(#accentGlow)" rx="2" />
  
  <!-- Network node decorations left -->
  <g opacity="0.15" transform="translate(80, 60)">
    <!-- Node 1 -->
    <circle cx="0" cy="0" r="8" fill="#06b6d4" />
    <circle cx="0" cy="0" r="4" fill="#3b82f6" />
    <!-- Node 2 -->
    <circle cx="60" cy="-40" r="6" fill="#06b6d4" />
    <circle cx="60" cy="-40" r="3" fill="#3b82f6" />
    <!-- Node 3 -->
    <circle cx="120" cy="20" r="10" fill="#06b6d4" />
    <circle cx="120" cy="20" r="5" fill="#3b82f6" />
    <!-- Node 4 -->
    <circle cx="-20" cy="80" r="7" fill="#06b6d4" />
    <circle cx="-20" cy="80" r="3.5" fill="#3b82f6" />
    <!-- Node 5 -->
    <circle cx="40" cy="130" r="9" fill="#06b6d4" />
    <circle cx="40" cy="130" r="4.5" fill="#3b82f6" />
    <!-- Connections -->
    <line x1="0" y1="0" x2="60" y2="-40" stroke="#06b6d4" stroke-width="1.5" stroke-dasharray="4,4" />
    <line x1="60" y1="-40" x2="120" y2="20" stroke="#06b6d4" stroke-width="1.5" stroke-dasharray="4,4" />
    <line x1="0" y1="0" x2="-20" y2="80" stroke="#06b6d4" stroke-width="1.5" stroke-dasharray="4,4" />
    <line x1="-20" y1="80" x2="40" y2="130" stroke="#06b6d4" stroke-width="1.5" stroke-dasharray="4,4" />
    <line x1="0" y1="0" x2="40" y2="130" stroke="#06b6d4" stroke-width="1.5" stroke-dasharray="4,4" />
    <line x1="120" y1="20" x2="40" y2="130" stroke="#06b6d4" stroke-width="1.5" stroke-dasharray="4,4" />
  </g>
  
  <!-- Raspberry Pi icon (simplified) -->
  <g transform="translate(280, 140)" opacity="0.9">
    <!-- Pi board -->
    <rect x="0" y="0" width="60" height="80" rx="6" fill="#334155" stroke="#06b6d4" stroke-width="2" />
    <!-- GPIO pins -->
    <rect x="-8" y="8" width="8" height="8" rx="2" fill="#06b6d4" opacity="0.8" />
    <rect x="-8" y="20" width="8" height="8" rx="2" fill="#06b6d4" opacity="0.8" />
    <rect x="-8" y="32" width="8" height="8" rx="2" fill="#06b6d4" opacity="0.8" />
    <rect x="-8" y="44" width="8" height="8" rx="2" fill="#06b6d4" opacity="0.8" />
    <rect x="-8" y="56" width="8" height="8" rx="2" fill="#06b6d4" opacity="0.8" />
    <rect x="-8" y="68" width="8" height="8" rx="2" fill="#06b6d4" opacity="0.8" />
    <!-- CPU -->
    <rect x="18" y="30" width="24" height="24" rx="4" fill="#06b6d4" opacity="0.6" />
    <!-- USB ports -->
    <rect x="62" y="16" width="10" height="14" rx="2" fill="#334155" stroke="#06b6d4" stroke-width="1" />
    <rect x="62" y="36" width="10" height="14" rx="2" fill="#334155" stroke="#06b6d4" stroke-width="1" />
    <!-- Ethernet -->
    <rect x="62" y="58" width="10" height="14" rx="2" fill="#334155" stroke="#3b82f6" stroke-width="1" />
  </g>
  
  <!-- Shield/security icon -->
  <g transform="translate(860, 140)" opacity="0.85">
    <path d="M30 0 L60 15 L60 45 Q60 65 30 75 Q0 65 0 45 L0 15 Z" fill="none" stroke="#06b6d4" stroke-width="2.5" />
    <path d="M22 32 L28 42 L42 26" fill="none" stroke="#10b981" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" />
  </g>
  
  <!-- Title -->
  <text x="600" y="130" font-family="'Segoe UI', -apple-system, Roboto, Helvetica, Arial, sans-serif" font-size="64" font-weight="bold" fill="#f8fafc" text-anchor="middle" filter="url(#softShadow)">DHCP Dashboard</text>
  
  <!-- Subtitle -->
  <text x="600" y="180" font-family="'Segoe UI', -apple-system, Roboto, Helvetica, Arial, sans-serif" font-size="22" fill="#94a3b8" text-anchor="middle" letter-spacing="2">Network Management for Raspberry Pi</text>
  
  <!-- Accent underline -->
  <rect x="370" y="200" width="460" height="3" rx="1.5" fill="url(#accent)" opacity="0.8" />
  
  <!-- Feature tags -->
  <g transform="translate(600, 260)" font-family="'Segoe UI', -apple-system, sans-serif" font-size="14" fill="#64748b" text-anchor="middle">
    <rect x="-340" y="-16" width="90" height="32" rx="16" fill="#1e293b" stroke="#06b6d4" stroke-width="1" opacity="0.9" />
    <text x="-295" y="5" fill="#06b6d4">DHCP</text>
    
    <rect x="-230" y="-16" width="90" height="32" rx="16" fill="#1e293b" stroke="#3b82f6" stroke-width="1" opacity="0.9" />
    <text x="-185" y="5" fill="#3b82f6">DNS</text>
    
    <rect x="-120" y="-16" width="90" height="32" rx="16" fill="#1e293b" stroke="#10b981" stroke-width="1" opacity="0.9" />
    <text x="-75" y="5" fill="#10b981">Secure</text>
    
    <rect x="-10" y="-16" width="120" height="32" rx="16" fill="#1e293b" stroke="#f59e0b" stroke-width="1" opacity="0.9" />
    <text x="50" y="5" fill="#f59e0b">Open Source</text>
    
    <rect x="130" y="-16" width="100" height="32" rx="16" fill="#1e293b" stroke="#8b5cf6" stroke-width="1" opacity="0.9" />
    <text x="180" y="5" fill="#8b5cf6">Pi 4 / 5</text>
  </g>
  
  <!-- Bottom text -->
  <text x="600" y="320" font-family="'Segoe UI', -apple-system, Roboto, Helvetica, sans-serif" font-size="12" fill="#475569" text-anchor="middle" letter-spacing="1">FASTAPI • REACT • TYPESCRIPT • TAILWIND • SQLITE • DOCKER</text>
</svg>
